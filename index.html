<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GB & Ireland Geology Explorer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0f0f0d; --surface:#1c1c18; --surface2:#242420;
  --border:rgba(255,255,255,0.09); --text:#ede9de; --muted:#7a7870;
  --accent:#c8a96e; --green:#7eb89a; --red:#d9705a;
  --font:'Georgia',serif; --sans:-apple-system,'Helvetica Neue',sans-serif;
}
html,body { height:100%; overflow:hidden; background:var(--bg); }
#app { height:100vh; display:flex; flex-direction:column; font-family:var(--sans); color:var(--text); }

/* Header */
#header {
  background:var(--bg); border-bottom:1px solid var(--border);
  padding:11px 14px; display:flex; align-items:center;
  justify-content:space-between; flex-shrink:0; z-index:1000;
}
#header h1 { font-family:var(--font); font-size:16px; font-weight:normal; color:var(--accent); }
#header p  { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-top:1px; }
#controls { display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end; }
.lbtn {
  font-size:11px; padding:5px 9px; border-radius:20px;
  border:1px solid var(--border); background:var(--surface);
  color:var(--muted); cursor:pointer; transition:all .15s; white-space:nowrap;
}
.lbtn.active { border-color:var(--accent); color:var(--accent); background:rgba(200,169,110,.12); }
.lbtn.source-active { border-color:var(--green); color:var(--green); background:rgba(126,184,154,.12); }

/* Map */
#map { flex:1; min-height:0; position:relative; }
#locate-btn {
  position:absolute; bottom:190px; right:12px; z-index:900;
  width:46px; height:46px; border-radius:50%;
  border:1px solid var(--border); background:var(--surface);
  color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.6); transition:all .15s; user-select:none;
}
#locate-btn:active { transform:scale(.92); }
#locate-btn.spin svg { animation:spin .9s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#opacity-wrap {
  position:absolute; bottom:248px; right:12px; z-index:900;
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:7px 9px;
  display:flex; flex-direction:column; align-items:center; gap:5px;
  box-shadow:0 2px 10px rgba(0,0,0,.5);
}
#opacity-wrap label { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
#opa { writing-mode:vertical-lr; direction:rtl; width:4px; height:56px; cursor:pointer; accent-color:var(--accent); }
#hint {
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  z-index:900; background:rgba(15,15,13,.88); border:1px solid var(--border);
  border-radius:20px; padding:5px 14px; font-size:12px; color:var(--muted);
  pointer-events:none; transition:opacity .5s; white-space:nowrap;
}
#hint.gone { opacity:0; }
#cover {
  position:absolute; inset:0; background:rgba(15,15,13,.65); z-index:800;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:10px; pointer-events:none;
  opacity:0; transition:opacity .25s;
}
#cover.on { opacity:1; pointer-events:all; }
.ring { width:30px; height:30px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .75s linear infinite; }
#cover-msg { font-size:13px; color:var(--muted); }

/* Info panel */
#panel {
  background:var(--surface); border-top:1px solid var(--border);
  flex-shrink:0; max-height:168px; overflow:hidden; transition:max-height .28s ease;
}
#panel.open { max-height:360px; overflow-y:auto; }
#phead {
  padding:11px 14px 9px; display:flex; align-items:center;
  justify-content:space-between; cursor:pointer; border-bottom:1px solid var(--border);
}
#phead-left { display:flex; align-items:center; gap:9px; }
#dot { width:11px; height:11px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:background .3s; }
#dot.ok   { background:var(--accent); }
#dot.busy { background:var(--green); animation:blink 1s infinite; }
#dot.err  { background:var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
#rock { font-family:var(--font); font-size:14px; color:var(--text); font-style:italic; line-height:1.3; }
#chevron { font-size:17px; background:none; border:none; color:var(--muted); cursor:pointer; padding:0 4px; transition:transform .2s; }
#panel.open #chevron { transform:rotate(180deg); }
#coords { padding:7px 14px 0; display:flex; gap:18px; }
.ci { display:flex; flex-direction:column; }
.cl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
.cv { font-size:13px; font-family:monospace; color:var(--text); }
/* Source badge */
#source-badge {
  font-size:10px; padding:2px 8px; border-radius:10px;
  border:1px solid var(--border); color:var(--muted);
  margin-left:auto; margin-right:4px; white-space:nowrap;
}
#source-badge.bgs  { border-color:var(--accent); color:var(--accent); }
#source-badge.gsi  { border-color:var(--green);  color:var(--green);  }
#pbody { padding:0 14px 12px; }
.row { display:flex; justify-content:space-between; align-items:baseline; padding:5px 0; border-bottom:1px solid var(--border); font-size:13px; }
.row:last-child { border-bottom:none; }
.rl { color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.06em; flex-shrink:0; margin-right:10px; }
.rv { color:var(--text); text-align:right; }
.rv.gold { color:var(--accent); font-family:var(--font); font-style:italic; }
.rv.dim  { color:var(--muted); font-size:12px; }
.rv.clickable {
  color:var(--accent); font-family:var(--font); font-style:italic;
  cursor:pointer; text-decoration:underline; text-decoration-style:dotted; text-underline-offset:3px;
}
.rv.clickable:hover { opacity:.8; }

/* Modal */
#modal-backdrop {
  position:fixed; inset:0; background:rgba(0,0,0,0.7);
  z-index:2000; display:flex; align-items:flex-end;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
#modal-backdrop.show { opacity:1; pointer-events:all; }
#modal {
  background:var(--surface); width:100%; max-height:85vh;
  border-radius:16px 16px 0 0; border-top:1px solid var(--border);
  display:flex; flex-direction:column;
  transform:translateY(100%); transition:transform .3s ease;
}
#modal-backdrop.show #modal { transform:translateY(0); }
#modal-handle { display:flex; justify-content:center; padding:10px 0 0; flex-shrink:0; cursor:pointer; }
#modal-handle-bar { width:36px; height:4px; border-radius:2px; background:var(--border); }
#modal-header {
  padding:10px 16px 12px; display:flex; align-items:flex-start;
  justify-content:space-between; border-bottom:1px solid var(--border); flex-shrink:0;
}
#modal-title { font-family:var(--font); font-size:16px; color:var(--accent); font-style:italic; line-height:1.35; flex:1; margin-right:12px; }
#modal-close { background:none; border:none; color:var(--muted); font-size:22px; cursor:pointer; line-height:1; padding:0 2px; flex-shrink:0; }
#modal-close:hover { color:var(--text); }
#modal-body { overflow-y:auto; padding:14px 16px 24px; flex:1; }
.modal-section { margin-bottom:16px; }
.modal-section-title { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:6px; }
.modal-section-body { font-size:13px; color:var(--text); line-height:1.6; }
.modal-section-body.italic { font-family:var(--font); font-style:italic; color:var(--accent); }
.modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.modal-cell { display:flex; flex-direction:column; gap:3px; }
.modal-cell-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
.modal-cell-value { font-size:13px; color:var(--text); }
.modal-ext-link {
  display:flex; align-items:center; gap:8px; padding:11px 14px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; color:var(--accent); font-size:13px;
  text-decoration:none; margin-top:8px;
}
.modal-ext-link:hover { border-color:var(--accent); }

/* Leaflet overrides */
.leaflet-control-zoom { border:1px solid var(--border)!important; }
.leaflet-control-zoom a { background:var(--surface)!important; color:var(--text)!important; border-color:var(--border)!important; }
.leaflet-control-attribution { background:rgba(15,15,13,.75)!important; color:var(--muted)!important; font-size:9px!important; }
.leaflet-control-attribution a { color:var(--accent)!important; }
.leaflet-container { background:#0a0a08; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <h1>GB &amp; Ireland Geology Explorer</h1>
      <p>BGS · Geological Survey Ireland</p>
    </div>
    <div id="controls">
      <button class="lbtn active" id="btn-bed" onclick="setLayer('bed')">Bedrock</button>
      <button class="lbtn"        id="btn-sup" onclick="setLayer('sup')">Superficial</button>
    </div>
  </div>

  <div id="map">
    <div id="cover" class="on"><div class="ring"></div><div id="cover-msg">Loading map…</div></div>
    <div id="hint">Tap anywhere on the map to query geology</div>
    <button id="locate-btn" onclick="locate()" aria-label="Find my location">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/><circle cx="12" cy="12" r="7"/>
      </svg>
    </button>
    <div id="opacity-wrap">
      <label>Opacity</label>
      <input type="range" id="opa" min="20" max="100" value="70" step="5" oninput="setOpacity(this.value)">
    </div>
  </div>

  <div id="panel">
    <div id="phead" onclick="togglePanel()">
      <div id="phead-left"><div id="dot"></div><span id="rock">Tap the map or press ⊕ to begin</span></div>
      <span id="source-badge"></span>
      <button id="chevron" aria-label="Expand">▾</button>
    </div>
    <div id="coords">
      <div class="ci"><span class="cl">Latitude</span><span class="cv" id="vlat">—</span></div>
      <div class="ci"><span class="cl">Longitude</span><span class="cv" id="vlon">—</span></div>
    </div>
    <div id="pbody">
      <div class="row"><span class="rl">Formation</span><span class="rv" id="v-formation">—</span></div>
      <div class="row"><span class="rl">Rock type</span><span class="rv" id="v-rocktype">—</span></div>
      <div class="row"><span class="rl">Age</span>      <span class="rv" id="v-age">—</span></div>
      <div class="row"><span class="rl">Period</span>   <span class="rv" id="v-period">—</span></div>
      <div class="row"><span class="rl">Map code</span> <span class="rv dim" id="v-code">—</span></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div id="modal">
    <div id="modal-handle" onclick="closeModal()"><div id="modal-handle-bar"></div></div>
    <div id="modal-header">
      <div id="modal-title">Formation details</div>
      <button id="modal-close" onclick="closeModal()" aria-label="Close">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// DATA SOURCES
// ═══════════════════════════════════════════════════════════════════════════════

// ── Great Britain: BGS ────────────────────────────────────────────────────────
const BGS_OGC   = 'https://ogcapi.bgs.ac.uk/collections/';
const BGS_COLS  = { bed:'bgsgeology625kbedrock', sup:'bgsgeology625ksuperficial' };
const BGS_WMS   = 'https://ogc.bgs.ac.uk/cgi-bin/BGS_Bedrock_and_Superficial_Geology/ows?';
const BGS_50K   = 'https://map.bgs.ac.uk/arcgis/services/BGS_Detailed_Geology/MapServer/WMSServer?';
const BGS_WMS_LAYERS  = { bed:'GBR_BGS_625k_BLS', sup:'GBR_BGS_625k_SLS' };
const BGS_50K_LAYERS  = { bed:'BGS.50k.Bedrock',  sup:'BGS.50k.Superficial.deposits' };
const BGS_LEXICON_URL = 'https://webapps.bgs.ac.uk/lexicon/lexicon.cfm?pub=';

// ── Republic of Ireland: GSI ──────────────────────────────────────────────────
// WMS tile overlay — 500k seamless ROI+NI dataset
const GSI_WMS  = 'https://gsi.geodata.gov.ie/server/services/Bedrock/IE_GSI_GSNI_Bedrock_Geology_Datasets_500K_IE32_ITM/MapServer/WMSServer?';
const GSI_WMS_LAYER = '0'; // Layer 0 = bedrock polygons in this WMS service

// FeatureServer for point queries — layer 2 = bedrock polygons, supports inSR=4326
const GSI_REST = 'https://gsi.geodata.gov.ie/server/rest/services/Bedrock/IE_GSI_GSNI_Bedrock_Geology_Datasets_500K_IE32_ITM/FeatureServer/2/query';

// GSI superficial (Quaternary) WMS and FeatureServer
const GSI_QUAT_WMS  = 'https://gsi.geodata.gov.ie/server/services/Quaternary/IE_GSI_QUAT_Datasets_500K_IE32_ITM/MapServer/WMSServer?';
const GSI_QUAT_REST = 'https://gsi.geodata.gov.ie/server/rest/services/Quaternary/IE_GSI_QUAT_Datasets_500K_IE32_ITM/FeatureServer/0/query';

// Ireland bounding box (approx) for detecting which source to query
// ROI lon: -10.6 to -6.0,  lat: 51.4 to 55.4
function isInIreland(lat, lon) {
  return lon >= -10.7 && lon <= -5.8 && lat >= 51.3 && lat <= 55.5;
}

// ═══════════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════════
let map, wmsGB625, wmsGB50k, wmsIE, marker;
let currentLayer = 'bed';
let opacity = 0.70;
let panelOpen = false;
let hintGone  = false;
let currentProps = null;
let currentSource = null; // 'bgs' or 'gsi'

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════
function init() {
  // Centre view to show both GB and Ireland
  map = L.map('map', { center:[54.0, -4.0], zoom:6, zoomControl:true });

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom:19,
    attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors'
  }).addTo(map);

  addWmsLayers();
  hideCover();

  map.on('click',         e => { hideHint(); placeMarker(e.latlng); query(e.latlng); });
  map.on('locationfound', onFound);
  map.on('locationerror', onLocErr);
}

// ═══════════════════════════════════════════════════════════════════════════════
// WMS LAYERS
// ═══════════════════════════════════════════════════════════════════════════════
function addWmsLayers() {
  if (wmsGB625) map.removeLayer(wmsGB625);
  if (wmsGB50k) map.removeLayer(wmsGB50k);
  if (wmsIE)    map.removeLayer(wmsIE);

  // GB bedrock 625k
  wmsGB625 = L.tileLayer.wms(BGS_WMS, {
    layers: BGS_WMS_LAYERS[currentLayer], format:'image/png',
    transparent:true, version:'1.1.1', opacity,
    attribution:'BGS © UKRI 2024'
  }).addTo(map);

  // GB bedrock 50k (detailed, zoom 11+)
  wmsGB50k = L.tileLayer.wms(BGS_50K, {
    layers: BGS_50K_LAYERS[currentLayer], format:'image/png',
    transparent:true, version:'1.3.0', opacity, minZoom:11,
    attribution:'BGS © UKRI 2024'
  }).addTo(map);

  // Ireland — only bedrock available at this scale from GSI 500k
  // (quaternary/superficial at 500k is a separate service)
  const ieWmsUrl  = currentLayer === 'sup' ? GSI_QUAT_WMS  : GSI_WMS;
  const ieWmsLyr  = currentLayer === 'sup' ? '0'            : GSI_WMS_LAYER;
  wmsIE = L.tileLayer.wms(ieWmsUrl, {
    layers: ieWmsLyr, format:'image/png',
    transparent:true, version:'1.3.0', opacity,
    attribution:'GSI © Geological Survey Ireland CC-BY 4.0'
  }).addTo(map);
}

function setLayer(type) {
  currentLayer = type;
  document.querySelectorAll('.lbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + type).classList.add('active');
  addWmsLayers(); resetPanel();
}

function setOpacity(v) {
  opacity = v / 100;
  [wmsGB625, wmsGB50k, wmsIE].forEach(l => l && l.setOpacity(opacity));
}

// ═══════════════════════════════════════════════════════════════════════════════
// GEOLOCATION
// ═══════════════════════════════════════════════════════════════════════════════
function locate() {
  document.getElementById('locate-btn').classList.add('spin');
  setDot('busy'); setRock('Finding your location…'); showCover('Locating you…');
  map.locate({ setView:true, maxZoom:14, timeout:10000 });
}
function onFound(e) {
  document.getElementById('locate-btn').classList.remove('spin');
  hideCover(); hideHint(); placeMarker(e.latlng); query(e.latlng);
}
function onLocErr(e) {
  document.getElementById('locate-btn').classList.remove('spin');
  hideCover(); setDot('err');
  setRock(e.message && e.message.includes('denied')
    ? 'Location blocked — allow access in browser settings, or tap the map'
    : 'Location unavailable — tap the map instead');
}

// ═══════════════════════════════════════════════════════════════════════════════
// QUERY — auto-detects GB vs Ireland and calls the right API
// ═══════════════════════════════════════════════════════════════════════════════
async function query(latlng) {
  setDot('busy'); setRock('Querying geology…');
  showCover('Querying…'); clearFields(); currentProps = null; currentSource = null;

  if (isInIreland(latlng.lat, latlng.lng)) {
    await queryGSI(latlng);
  } else {
    await queryBGS(latlng);
  }
}

// ── BGS query (OGC API bbox, returns GeoJSON) ─────────────────────────────────
async function queryBGS(latlng) {
  const d = 0.005, lat = latlng.lat, lon = latlng.lng;
  const url = `${BGS_OGC}${BGS_COLS[currentLayer]}/items?f=json&limit=1&bbox=${lon-d},${lat-d},${lon+d},${lat+d}`;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    hideCover();
    if (!data.features || data.features.length === 0) {
      setDot('err'); setRock('No BGS data here — try zooming in or tapping a different spot');
      setVal('v-formation', 'Outside UK coverage or offshore'); return;
    }
    currentSource = 'bgs';
    currentProps  = data.features[0].properties;
    displayBGS(currentProps);
  } catch(e) {
    hideCover(); setDot('err'); setRock('BGS query failed — check connection'); console.error(e);
  }
}

// ── GSI query (ArcGIS FeatureServer, inSR=4326, JSONP to handle potential CORS) ─
let _gsiCb = 0;
function queryGSI(latlng) {
  return new Promise(resolve => {
    const restUrl = currentLayer === 'sup' ? GSI_QUAT_REST : GSI_REST;
    const cbName  = '_gsi_cb_' + (++_gsiCb);
    let timer;

    window[cbName] = function(data) {
      clearTimeout(timer);
      hideCover();
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();

      if (!data.features || data.features.length === 0) {
        setDot('err');
        setRock(currentLayer === 'sup'
          ? 'No superficial data here — try Bedrock layer for Ireland'
          : 'No GSI data here — may be outside Republic of Ireland coverage');
        setVal('v-formation', 'Try tapping a different spot');
        resolve(); return;
      }
      currentSource = 'gsi';
      currentProps  = data.features[0].attributes;
      displayGSI(currentProps);
      resolve();
    };

    timer = setTimeout(() => {
      hideCover(); delete window[cbName];
      const s = document.getElementById(cbName); if (s) s.remove();
      setDot('err'); setRock('GSI server timed out — try again'); resolve();
    }, 12000);

    const params = new URLSearchParams({
      geometry:       `${latlng.lng},${latlng.lat}`,
      geometryType:   'esriGeometryPoint',
      inSR:           '4326',
      spatialRel:     'esriSpatialRelIntersects',
      outFields:      '*',
      returnGeometry: 'false',
      callback:       cbName,
      f:              'json'
    });

    const script = document.createElement('script');
    script.id  = cbName;
    script.src = `${restUrl}?${params}`;
    script.onerror = () => {
      clearTimeout(timer); hideCover(); delete window[cbName]; script.remove();
      setDot('err'); setRock('Could not reach GSI server — check connection'); resolve();
    };
    document.head.appendChild(script);
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// DISPLAY RESULTS
// ═══════════════════════════════════════════════════════════════════════════════
function displayBGS(p) {
  const formation = p.lex_d   || p.lex_rcs_d || p.rcs_d || '—';
  const rocktype  = p.rcs_d   || p.bgstype   || '—';
  const age       = (p.max_time_d && p.min_time_d && p.max_time_d !== p.min_time_d)
                    ? `${p.max_time_d} – ${p.min_time_d}` : (p.max_time_d || p.min_time_d || '—');
  const period    = p.max_period || p.max_era || p.max_eon || '—';
  const code      = p.lex_rcs   || p.map_code || p.lex   || '—';
  const headline  = p.lex_d     || p.rcs_d    || formation;
  const lexCode   = p.lex       || null;

  setDot('ok');
  setRock(headline.length > 58 ? headline.slice(0,58)+'…' : headline);
  setSourceBadge('bgs');

  const fEl = document.getElementById('v-formation');
  fEl.textContent = formation;
  if (lexCode && formation !== '—') {
    fEl.className = 'rv clickable';
    fEl.title     = 'Tap for full BGS description';
    fEl.onclick   = () => openModalBGS(formation, lexCode, p);
  } else {
    fEl.className = 'rv gold'; fEl.onclick = null;
  }

  setVal('v-rocktype', rocktype);
  setVal('v-age',      age);
  setVal('v-period',   period);
  setVal('v-code',     code, 'dim');
}

function displayGSI(a) {
  // GSI 500k FeatureServer field names
  const formation = a.UNITNAME   || a.LITH_DESC || a.DESCRIPT || '—';
  const rocktype  = a.LITH_DESC  || a.LITHO     || '—';
  const age       = (a.MAXAGE && a.MINAGE && a.MAXAGE !== a.MINAGE)
                    ? `${a.MAXAGE} – ${a.MINAGE}` : (a.MAXAGE || a.MINAGE || a.AGE || '—');
  const period    = a.PERIOD     || a.ERA        || '—';
  const code      = a.CODE       || a.MAPUNITID  || a.OBJECTID || '—';
  const headline  = a.UNITNAME   || formation;

  setDot('ok');
  setRock(headline.length > 58 ? headline.slice(0,58)+'…' : headline);
  setSourceBadge('gsi');

  const fEl = document.getElementById('v-formation');
  fEl.textContent = formation;
  fEl.className   = 'rv clickable';
  fEl.title       = 'Tap for full GSI description';
  fEl.onclick     = () => openModalGSI(formation, a);

  setVal('v-rocktype', rocktype);
  setVal('v-age',      age);
  setVal('v-period',   period);
  setVal('v-code',     String(code), 'dim');
}

// ═══════════════════════════════════════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════════════════════════════════════
function openModalBGS(formationName, lexCode, p) {
  document.getElementById('modal-title').textContent = formationName;

  const formation  = p.lex_d      || p.lex_rcs_d || '—';
  const lexRcsDesc = p.lex_rcs_d  || '—';
  const rocktype   = p.rcs_d      || p.bgstype   || '—';
  const bgstype    = p.bgstype    || '—';
  const maxAge     = p.max_time_d || '—';
  const minAge     = p.min_time_d || '—';
  const maxAgeY    = p.max_time_y ? (p.max_time_y/1e6).toFixed(0)+' Ma' : '—';
  const minAgeY    = p.min_time_y ? (p.min_time_y/1e6).toFixed(0)+' Ma' : '—';
  const maxPeriod  = p.max_period || '—';
  const minPeriod  = p.min_period || '—';
  const mapCode    = p.map_code   || p.lex_rcs   || '—';
  const rank       = p.rank       || '—';

  let html = `<div class="modal-section">
    <div class="modal-section-title">Formation</div>
    <div class="modal-section-body italic">${formation}</div>
  </div>`;

  if (lexRcsDesc !== '—' && lexRcsDesc !== formation) {
    html += `<div class="modal-section">
      <div class="modal-section-title">Full unit description</div>
      <div class="modal-section-body">${lexRcsDesc}</div>
    </div>`;
  }
  if (rocktype !== '—') {
    html += `<div class="modal-section">
      <div class="modal-section-title">Rock character</div>
      <div class="modal-section-body">${rocktype}</div>
    </div>`;
  }

  html += `<div class="modal-grid">`;
  html += cell('Map code', mapCode); html += cell('Rank',      rank);
  html += cell('Type',     bgstype); html += cell('LEX code',  lexCode||'—');
  html += cell('Max age',  maxAge);  html += cell('Min age',   minAge);
  if (maxAgeY !== '—') html += cell('Approx. max', maxAgeY);
  if (minAgeY !== '—') html += cell('Approx. min', minAgeY);
  html += cell('Period', maxPeriod !== minPeriod && minPeriod !== '—'
    ? `${maxPeriod} – ${minPeriod}` : maxPeriod);
  html += cell('Era', p.max_era||'—'); html += cell('Eon', p.max_eon||'—');
  html += `</div>`;

  html += extLink(BGS_LEXICON_URL + encodeURIComponent(lexCode),
    'View full entry in BGS Lexicon of Named Rock Units');

  showModal(html);
}

function openModalGSI(formationName, a) {
  document.getElementById('modal-title').textContent = formationName;

  const unitname  = a.UNITNAME  || '—';
  const lithDesc  = a.LITH_DESC || a.LITHO    || '—';
  const descript  = a.DESCRIPT  || a.COMMENTS || '';
  const maxAge    = a.MAXAGE    || '—';
  const minAge    = a.MINAGE    || '—';
  const period    = a.PERIOD    || '—';
  const era       = a.ERA       || '—';
  const code      = a.CODE      || '—';
  const mapId     = a.MAPUNITID || '—';

  let html = `<div class="modal-section">
    <div class="modal-section-title">Rock Unit</div>
    <div class="modal-section-body italic">${unitname}</div>
  </div>`;

  if (descript) {
    html += `<div class="modal-section">
      <div class="modal-section-title">Description</div>
      <div class="modal-section-body">${descript}</div>
    </div>`;
  }
  if (lithDesc !== '—') {
    html += `<div class="modal-section">
      <div class="modal-section-title">Lithology</div>
      <div class="modal-section-body">${lithDesc}</div>
    </div>`;
  }

  html += `<div class="modal-grid">`;
  html += cell('Code',     code);   html += cell('Map unit ID', mapId);
  html += cell('Max age',  maxAge); html += cell('Min age',     minAge);
  html += cell('Period',   period); html += cell('Era',         era);
  // include any other useful fields returned
  if (a.THICKNESS)  html += cell('Thickness',  a.THICKNESS);
  if (a.SUPERGROUP) html += cell('Supergroup', a.SUPERGROUP);
  if (a.GROUP_NAME) html += cell('Group',      a.GROUP_NAME);
  if (a.FM_NAME)    html += cell('Formation',  a.FM_NAME);
  html += `</div>`;

  html += extLink('https://www.gsi.ie/en-ie/programmes-and-projects/bedrock-mapping/Pages/default.aspx',
    'Geological Survey Ireland — Bedrock Mapping');

  showModal(html);
}

function cell(label, value) {
  return `<div class="modal-cell">
    <span class="modal-cell-label">${label}</span>
    <span class="modal-cell-value">${value||'—'}</span>
  </div>`;
}

function extLink(href, label) {
  return `<a class="modal-ext-link" href="${href}" target="_blank" rel="noopener">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    ${label}
  </a>`;
}

function showModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-backdrop').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('show');
  document.body.style.overflow = '';
}
function handleBackdropClick(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
}

// Swipe down to close
let touchStartY = 0;
document.getElementById('modal').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
document.getElementById('modal').addEventListener('touchend',   e => { if (e.changedTouches[0].clientY - touchStartY > 80) closeModal(); });

// ═══════════════════════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function placeMarker(latlng) {
  if (marker) map.removeLayer(marker);
  marker = L.circleMarker(latlng, {
    radius:7, fillColor:'#c8a96e', color:'#0f0f0d', weight:2.5, fillOpacity:1
  }).addTo(map);
  document.getElementById('vlat').textContent = latlng.lat.toFixed(5);
  document.getElementById('vlon').textContent = latlng.lng.toFixed(5);
}

function setSourceBadge(source) {
  const el = document.getElementById('source-badge');
  if (source === 'bgs') {
    el.textContent = 'BGS'; el.className = 'source-badge bgs';
  } else if (source === 'gsi') {
    el.textContent = 'GSI'; el.className = 'source-badge gsi';
  } else {
    el.textContent = ''; el.className = 'source-badge';
  }
}

function setDot(s)  { const d=document.getElementById('dot'); d.className=''; if(s) d.classList.add(s); }
function setRock(t) { document.getElementById('rock').textContent = t; }
function setVal(id, v, cls) {
  const el = document.getElementById(id);
  el.textContent = v || '—';
  el.className = 'rv' + (cls ? ' '+cls : '');
  el.onclick = null;
}
function clearFields() {
  ['v-formation','v-rocktype','v-age','v-period','v-code'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent='—'; el.className='rv'; el.onclick=null;
  });
}
function resetPanel() {
  setDot(''); setRock('Tap the map or press ⊕ to begin');
  clearFields(); setSourceBadge(null); currentProps=null; currentSource=null;
  document.getElementById('vlat').textContent='—';
  document.getElementById('vlon').textContent='—';
}
function togglePanel()  { panelOpen=!panelOpen; document.getElementById('panel').classList.toggle('open',panelOpen); }
function showCover(m)   { document.getElementById('cover-msg').textContent=m; document.getElementById('cover').classList.add('on'); }
function hideCover()    { document.getElementById('cover').classList.remove('on'); }
function hideHint()     { if(!hintGone){ hintGone=true; document.getElementById('hint').classList.add('gone'); } }

init();
</script>
